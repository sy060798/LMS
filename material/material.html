<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Material Master</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f4f6f9}
header{background:#0d47a1;color:#fff;padding:18px 25px;font-size:28px;font-weight:bold}
nav{background:#1565c0;padding:12px;display:flex;gap:10px;flex-wrap:wrap}
nav a{
color:#fff;
text-decoration:none;
padding:10px 16px;
border-radius:8px;
background:rgba(255,255,255,.12)
}
nav a:hover{background:rgba(255,255,255,.22)}

.container{padding:20px}

.box{
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 5px 14px rgba(0,0,0,.08)
}

.top{
display:flex;
gap:10px;
justify-content:space-between;
flex-wrap:wrap;
margin-bottom:15px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:8px;
min-width:250px;
}

button{
padding:10px 14px;
border:none;
background:#1565c0;
color:#fff;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{background:#0d47a1}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:left;
}

th{background:#e3f2fd}

.action{
cursor:pointer;
font-size:18px;
margin-right:8px;
}
</style>
</head>

<body>

<header>FS Ticket DB</header>

<nav>
<a href="../index.html">Dashboard</a>
<a href="../page/addtiket.html">Add Ticket</a>
<a href="material.html">Material</a>
</nav>

<div class="container">

<div class="box">

<div class="top">
<input type="text" id="search" placeholder="Cari Material...">
<button onclick="addMaterial()">+ Tambah Material</button>
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama Material</th>
<th>Satuan</th>
<th>Harga</th>
<th>QTY</th>
<th>Total Harga</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="matBody"></tbody>

</table>

</div>
</div>

<script src="./material.js"></script>

</body>
</html>
