<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS Ticket Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f4f6f9}
header{background:#0d47a1;color:#fff;padding:16px 24px;font-size:28px;font-weight:bold}
nav{background:#1565c0;padding:12px;display:flex;gap:10px;flex-wrap:wrap}
nav a{
color:#fff;
text-decoration:none;
padding:10px 16px;
border-radius:8px;
background:rgba(255,255,255,.12)
}
nav a:hover{background:rgba(255,255,255,.22)}
.container{padding:20px}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px
}
.card{
background:#fff;
border-radius:14px;
padding:18px;
box-shadow:0 4px 10px rgba(0,0,0,.08)
}
.card h3{
font-size:15px;
color:#666;
margin-bottom:8px
}
.card .num{
font-size:34px;
font-weight:bold;
color:#1565c0
}
.table-wrap{
margin-top:20px;
background:#fff;
border-radius:14px;
padding:16px;
box-shadow:0 4px 10px rgba(0,0,0,.08)
}
table{
width:100%;
border-collapse:collapse
}
th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left
}
th{background:#e3f2fd}
.status{
padding:4px 10px;
border-radius:20px;
background:#00bcd4;
color:#fff;
font-size:12px
}
.btn-export{
margin-top:15px;
padding:10px 18px;
border:none;
background:#0d47a1;
color:#fff;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
.btn-export:hover{
background:#08306b;
}

.search-box{
margin:15px 0;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.search-box input{
padding:10px 14px;
border:1px solid #ccc;
border-radius:8px;
min-width:280px;
}

.aksi{
display:flex;
gap:8px;
}

.icon-btn{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:16px;
color:#fff;
}

.box-btn{background:#1565c0;}
.edit-btn{background:#f39c12;}
.del-btn{background:#e74c3c;}
</style>
</head>

<body>

<header>FS Ticket DB</header>

<nav>
<a href="index.html">Dashboard</a>
<a href="page/addtiket.html">Add Ticket</a>
<a href="material/material.html">Material</a>
<a href="#" onclick="exportExcel()">Export Excel</a>
</nav>

<div class="container">

<div class="grid">
<div class="card">
<h3>Total Ticket</h3>
<div class="num" id="totTicket">0</div>
</div>

<div class="card">
<h3>Open Ticket</h3>
<div class="num" id="openTicket">0</div>
</div>

<div class="card">
<h3>Closed Ticket</h3>
<div class="num" id="closeTicket">0</div>
</div>

<div class="card">
<h3>Total Material</h3>
<div class="num" id="matCount">0</div>
</div>
</div>

<div class="table-wrap">

<h2 style="margin-bottom:12px">Recent Tickets</h2>

<div class="search-box">
<input type="text" id="searchCustomer" placeholder="Cari Customer...">
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Customer</th>
<th>Project</th>
<th>SPK</th>
<th>Tanggal</th>
<th>City</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="ticketBody"></tbody>

</table>

<button class="btn-export" onclick="exportExcel()">
Export Excel
</button>

</div>
</div>

<script>

const data = JSON.parse(localStorage.getItem('tickets') || '[]');

document.getElementById('totTicket').textContent = data.length;

document.getElementById('openTicket').textContent =
data.filter(x => x.status === 'Open').length;

document.getElementById('closeTicket').textContent =
data.filter(x => x.status === 'Close').length;

document.getElementById('matCount').textContent =
data.filter(x => x.material && x.material.length > 0).length;

const body = document.getElementById('ticketBody');

function loadTable(filter=""){

let rows = data.filter(x =>
x.customer.toLowerCase().includes(filter.toLowerCase())
);

body.innerHTML = rows.slice(-50).reverse().map((x,i)=>`
<tr>
<td>${i+1}</td>
<td>${x.customer}</td>
<td>${x.project}</td>
<td>${x.spk}</td>
<td>${x.tanggal}</td>
<td>${x.city}</td>
<td><span class="status">${x.status}</span></td>
<td>
<div class="aksi">
<button class="icon-btn box-btn" onclick="openMaterial(${data.indexOf(x)})">📦</button>
<button class="icon-btn edit-btn" onclick="editTicket(${data.indexOf(x)})">✏️</button>
<button class="icon-btn del-btn" onclick="hapusTicket(${data.indexOf(x)})">🗑️</button>
</div>
</td>
</tr>
`).join('');

}

loadTable();

document.getElementById("searchCustomer").addEventListener("input",function(){
loadTable(this.value);
});

function openMaterial(i){
location.href="material/material.html?id="+i;
}

function editTicket(i){

let x = data[i];

x.customer = prompt("Customer",x.customer) || x.customer;
x.project  = prompt("Project",x.project) || x.project;
x.spk      = prompt("SPK",x.spk) || x.spk;
x.city     = prompt("City",x.city) || x.city;

localStorage.setItem("tickets",JSON.stringify(data));
loadTable();

}

function hapusTicket(i){

if(confirm("Hapus ticket ini?")){
data.splice(i,1);
localStorage.setItem("tickets",JSON.stringify(data));

document.getElementById('totTicket').textContent = data.length;

document.getElementById('openTicket').textContent =
data.filter(x => x.status === 'Open').length;

document.getElementById('closeTicket').textContent =
data.filter(x => x.status === 'Close').length;

document.getElementById('matCount').textContent =
data.filter(x => x.material && x.material.length > 0).length;

loadTable();
}

}

function exportExcel(){

if(data.length === 0){
alert("Data kosong");
return;
}

let csv = [];
csv.push([
"No",
"Customer",
"Project",
"SPK",
"Tanggal",
"City",
"Status"
]);

data.forEach((x,i)=>{
csv.push([
i+1,
x.customer,
x.project,
x.spk,
x.tanggal,
x.city,
x.status
]);
});

let content = csv.map(e => e.join(",")).join("\n");

let blob = new Blob(
[content],
{type:"text/csv;charset=utf-8;"}
);

let link = document.createElement("a");

link.href = URL.createObjectURL(blob);

link.download = "FS_Ticket_Report.csv";

link.click();
}

</script>

<script src="js/index.js"></script>
<script src="js/addtiket.js"></script>
<script src="material/material.js"></script>

</body>
</html>
