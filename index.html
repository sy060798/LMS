<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS Ticket Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f4f6f9}

header{
background:#0d47a1;
color:#fff;
padding:16px 24px;
font-size:28px;
font-weight:bold
}

nav{
background:#1565c0;
padding:12px;
display:flex;
gap:10px;
flex-wrap:wrap
}

nav a{
color:#fff;
text-decoration:none;
padding:10px 16px;
border-radius:8px;
background:rgba(255,255,255,.12)
}

nav a:hover{background:rgba(255,255,255,.22)}

.container{padding:20px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px
}

.card{
background:#fff;
border-radius:14px;
padding:18px;
box-shadow:0 4px 10px rgba(0,0,0,.08)
}

.card h3{font-size:15px;color:#666;margin-bottom:8px}
.card .num{font-size:34px;font-weight:bold;color:#1565c0}

/* TABLE */
.table-wrap{
margin-top:20px;
background:#fff;
border-radius:14px;
padding:16px;
box-shadow:0 4px 10px rgba(0,0,0,.08)
}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
th{background:#e3f2fd}

.search-box{
margin:15px 0;
display:flex;
gap:10px;
}

.search-box input{
padding:10px 14px;
border:1px solid #ccc;
border-radius:8px;
min-width:280px;
}

.icon-btn{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:14px;
color:#fff;
background:#1565c0;
}

/* =========================
   POPUP MATERIAL (FIXED)
========================= */
#materialPopup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.6);
z-index:9999;
justify-content:center;
align-items:center;
}

.modal-box{
background:#fff;
width:90%;
max-width:1000px;
padding:20px;
border-radius:12px;
max-height:85vh;
overflow:auto;
}

.modal-header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.close-btn{
background:red;
color:#fff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<header>FS Ticket DB</header>

<nav>
<a href="index.html">Dashboard</a>
<a href="page/addtiket.html">Add Ticket</a>

<!-- ❌ MATERIAL HAPUS DARI MENU (sesuai request kamu) -->

<a href="#" onclick="exportExcel()">Export Excel</a>
<a href="#" onclick="saveNow()">Save</a>
</nav>

<div class="container">

<div class="grid">
<div class="card"><h3>Total Ticket</h3><div class="num" id="totTicket">0</div></div>
<div class="card"><h3>Open Ticket</h3><div class="num" id="openTicket">0</div></div>
<div class="card"><h3>Closed Ticket</h3><div class="num" id="closeTicket">0</div></div>
<div class="card"><h3>Total Material</h3><div class="num" id="matCount">0</div></div>
</div>

<div class="table-wrap">
<h2>Recent Tickets</h2>

<div class="search-box">
<input type="text" id="searchCustomer" placeholder="Cari Project...">
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Customer</th>
<th>Project</th>
<th>SPK</th>
<th>Tanggal</th>
<th>City</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="ticketBody"></tbody>
</table>

</div>
</div>

<!-- =========================
     MATERIAL POPUP
========================= -->
<div id="materialPopup">

  <div class="modal-box">

    <div class="modal-header">
      <h2>📦 Material Ticket</h2>
      <button class="close-btn" onclick="closeMaterialPopup()">X</button>
    </div>

    <input id="matSearch"
      placeholder="Cari material..."
      style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ccc;border-radius:6px">

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>Satuan</th>
          <th>Harga</th>
          <th>Qty</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="matBody"></tbody>
    </table>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script src="./js/syncEngine.js"></script>
<script src="./js/index.js"></script>
<script src="./js/Addtiket.js"></script>
<script src="../material/material.js"></script>

</body>
</html>
