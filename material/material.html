<!-- BUTTON DI DASHBOARD -->
<button onclick="openMaterialPopup()" style="padding:10px 14px;">
  📦 Material
</button>

<!-- ================= POPUP ================= -->
<div id="materialModal" style="
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
z-index:9999;
">

  <div style="
  background:#fff;
  width:90%;
  max-width:900px;
  margin:40px auto;
  border-radius:12px;
  padding:15px;
  max-height:85vh;
  overflow:auto;
  ">

    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2>📦 Material Ticket</h2>
      <button onclick="closeMaterialPopup()">❌</button>
    </div>

    <hr>

    <table width="100%" border="1" style="border-collapse:collapse;margin-top:10px;">
      <thead>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>Satuan</th>
          <th>Harga</th>
          <th>QTY</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="popupMatBody"></tbody>
    </table>

  </div>
</div>
